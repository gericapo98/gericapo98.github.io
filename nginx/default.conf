server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---- compression ----
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types      text/plain text/css application/javascript
                    image/svg+xml application/json;

    # ---- security headers ----
    add_header X-Content-Type-Options  "nosniff"                       always;
    add_header X-Frame-Options         "SAMEORIGIN"                    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ---- cache static assets (content rarely changes) ----
    # NOTE: no add_header here on purpose — an add_header in a location stops the
    # server-level security headers from being inherited. `expires` sets
    # Cache-Control without that side effect, so the headers above still apply.
    location ~* \.(css|js|svg|png|jpe?g|gif|ico|woff2?)$ {
        expires   7d;
        try_files $uri =404;
    }

    # ---- everything else falls back to index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
